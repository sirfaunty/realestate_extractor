# 10. PARTNERSHIP CONFIGURATION
# =====================================================================
# Source: LLC Agreement of Chamberlain Apartments LLC (7/5/2017), §3 and §5.

partnership:
  entity_name:
    value: "Chamberlain Apartments LLC"
    source: llc_agreement_2017
    locator: { page: 1, section: "Preamble" }
    verbatim: "Chamberlain Apartments LLC"
  formation_date:
    value: 2017-07-05
    source: llc_agreement_2017
    locator: { page: 1 }
  governing_state:
    value: "Minnesota"
    source: llc_agreement_2017
    locator: { page: 1 }

  investor_classes:
    - id: KA
      name:
        value: "Kraus-Anderson, Incorporated"
        source: llc_agreement_2017
        locator: { section: "Definitions — KA Member" }
      role: MANAGING_MEMBER
      membership_interest_pct:
        value: 0.75
        source: llc_agreement_2017
        locator: { section: "§3.2 Membership Interests" }
        verbatim: "75%"
      membership_adjusted_distribution_pct:
        value: 0.75
        source: llc_agreement_2017
        locator: { section: "§5.2(c) Distribution of Cash Flow" }
      pref_return_rate:
        value: 0.065
        source: llc_agreement_2017
        locator: { section: "§5.2(b) Preferred Return" }
        verbatim: "6.5%"
      pref_compounding: monthly
    - id: IDP
      name:
        value: "Inland Development Partners"
        source: llc_agreement_2017
        locator: { section: "Definitions — IDP Member" }
      role: LP
      membership_interest_pct:
        value: 0.25
        source: llc_agreement_2017
        locator: { section: "§3.2 Membership Interests" }
        verbatim: "25%"
      membership_adjusted_distribution_pct:
        value: 0.25
        source: llc_agreement_2017
        locator: { section: "§5.2(c)" }
      pref_return_rate:
        value: 0.065
        source: llc_agreement_2017
        locator: { section: "§5.2(b)" }
      pref_compounding: monthly

  waterfall:
    # Tier 1: KA 100% escrow recapture
    - tier_order: 1
      tier_type: escrow_recapture
      name: "KA Escrow Recapture"
      governing_provision_id: llc_5_2_a
      allocation:
        KA: { value: 1.0, source: llc_agreement_2017, locator: { section: "§5.2(a)" } }
        IDP: { value: 0.0, source: llc_agreement_2017, locator: { section: "§5.2(a)" } }
      cap_amount:
        value: 0.0   # filled in by historical equity ledger once we know escrow balance
        source: equity_account_details
        locator: { note: "Determined by historical KA escrow contributions" }
      note: "100% of distributable cash to KA until KA's escrow contribution is fully recouped"

    # Tier 2: 6.5% pref to both, pro-rata to unreturned pref balance
    - tier_order: 2
      tier_type: preferred_return
      name: "6.5% Preferred Return"
      governing_provision_id: llc_5_2_b
      pref_classes: [KA, IDP]
      allocation:
        KA: { value: 0.75, source: llc_agreement_2017, locator: { section: "§5.2(b)" } }
        IDP: { value: 0.25, source: llc_agreement_2017, locator: { section: "§5.2(b)" } }
      note: "Pro-rata allocation by unreturned pref balance; both classes earn 6.5% on contributed capital, compounded monthly"

    # Tier 3: 75/25 pari-passu on remaining
    - tier_order: 3
      tier_type: pari_passu
      name: "75/25 Pari Passu"
      governing_provision_id: llc_5_2_c
      allocation:
        KA: { value: 0.75, source: llc_agreement_2017, locator: { section: "§5.2(c)" } }
        IDP: { value: 0.25, source: llc_agreement_2017, locator: { section: "§5.2(c)" } }


