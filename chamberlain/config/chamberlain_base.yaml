    2: { value: 0.0350, source: valuation_proforma_with_improvements_11_16_25, locator: { sheet: "ASSUMPTIONS", cell: "G35" }, note: "Proforma Year 2" }
    3: { value: 0.0250, source: valuation_proforma_with_improvements_11_16_25, locator: { sheet: "ASSUMPTIONS", cell: "H35" }, note: "Proforma Year 3" }
