governing_provisions:
  - id: llc_5_2_a
    provision_type: distribution_waterfall
    title: "LLC §5.2(a) — KA Escrow Recapture"
    citations:
      - source: llc_agreement_2017
        locator: { section: "§5.2(a)", page: 23 }
        verbatim: "First, to the KA Member until the entire amount of all distributions made..."
    structured_logic:
      tier_type: escrow_recapture
      allocation: { KA: 1.0, IDP: 0.0 }
      cap: "KA_escrow_contribution_balance"

  - id: llc_5_2_b
    provision_type: distribution_waterfall
    title: "LLC §5.2(b) — 6.5% Preferred Return"
    citations:
      - source: llc_agreement_2017
        locator: { section: "§5.2(b)", page: 23 }
        verbatim: "Second, to the Members in proportion to their unreturned Preferred Return..."
    structured_logic:
      tier_type: preferred_return
      pref_rate: 0.065
      compound: monthly
      classes: [KA, IDP]
      allocation_basis: pro_rata_unreturned_pref

  - id: llc_5_2_c
    provision_type: distribution_waterfall
    title: "LLC §5.2(c) — 75/25 Pari Passu"
    citations:
      - source: llc_agreement_2017
        locator: { section: "§5.2(c)", page: 23 }
        verbatim: "Third, to the Members in proportion to their Membership Adjusted Distribution Percentages (KA 75% / IDP 25%)"
    structured_logic:
      tier_type: pari_passu
      allocation: { KA: 0.75, IDP: 0.25 }

  - id: maa_value_floor
    provision_type: maa_value_floor
    title: "MAA §4 — Minimum Assessment Agreement Value Floor"
    citations:
      - source: llc_agreement_2017
        locator: { section: "MAA §4" }
        verbatim: "the taxable market value of the Property shall not be less than $43,835,000"
    structured_logic:
      floor_value: 43835000
      effective_from: "2021-01-02"
      effective_through: "TIF_termination"
      applies_to: taxable_market_value
