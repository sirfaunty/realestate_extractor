# =====================================================================
# Chamberlain Apartments — Base Scenario Configuration
# =====================================================================
#
# This YAML defines the BASE scenario for Chamberlain's forward proforma.
# Scenario overlays (e.g. "Inc Improvements" vs "No Improvements") layer
# on top of this base by overriding specific values.
#
# Every material input value uses the following shape:
#   field_name:
#     value: <number or string>
#     source: <SourceDocument id>          # see registry_builder.py
#     locator:                             # any of these
#       sheet: <worksheet name>
#       cell: <e.g. "N53">
#       row: <int>
#       column: <letter or label>
#       col_label: <header label>
#       page: <int, 1-indexed>
#       section: <e.g. "§5.2(a)">
#       note: <free-form>
#     verbatim: <exact text/value from source>
#     note: <optional context>
#
# Non-material values (formatting, IDs, free text) are plain YAML scalars.
#
# Source document IDs reference registry_builder.py. The loader verifies
# every cited source_document_id exists in the registry before constructing
# Cited[T] values.
# =====================================================================


meta:
  scenario_id: chamberlain_base
  name: "Chamberlain Base Scenario"
  description: >
    Base forward proforma for Chamberlain Apartments derived from the
    Excel "Inc Improvements" valuation proforma (11/16/2025) and Property
    Overview Summary (11/7/2025). Year 1 = 2026 calendar year.
  proforma_start_date: 2026-04-01   # FY basis: Year 1 = Apr 2026 - Mar 2027
  hold_years: 10
  sale_year: 10


