# =====================================================================
# 5. OPERATING EXPENSES (Detail Mode)
# =====================================================================
# Year 1 amounts in $/year flat (TOTAL_DOLLARS basis).
# Year 2 typically follows the global OpEx inflation; per-line overrides
# allowed (none for Chamberlain in base case).
# Year-1 anchor: 2026 Budget Reforecast values (Property Overview),
# which carry the Excel proforma's Y1 forecast.

opex:
  method: DETAIL
  lines:
    - name: "Real Estate Taxes"
      line_id: real_estate_taxes
      basis: total_dollars
      year1_amount: { value: 940000.0, source: property_overview_11_7_25,
                      locator: { sheet: "Annual Cash Flow Reforecast", cell: "J29",
                                 row_label: "Real Estate Taxes", col_label: "2026 Proforma" } }
    - name: "Insurance"
      line_id: insurance
      basis: total_dollars
      year1_amount: { value: 125664.0, source: property_overview_11_7_25,
                      locator: { sheet: "Annual Cash Flow Reforecast", cell: "J30",
                                 row_label: "Insurance", col_label: "2026 Proforma" } }
