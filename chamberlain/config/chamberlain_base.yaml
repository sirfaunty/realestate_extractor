# =====================================================================
# 4. INCOME OFFSETS
# =====================================================================
# Year 1 / Year 2 / Year 3 / Year 4+ schedule from Excel rows 34-36.
# Stabilized vacancy is a single rate applied to all years.

income_offsets:
  # Proforma-year offsets map to Excel ASSUMPTIONS columns F/G/H/I:
  #   F = Proforma Year 1, G = Year 2, H = Year 3, I = Year 4+ (terminal).
  # Columns D (2024 Actuals) and E (2025 Budget) are HISTORICAL and are
  # deliberately NOT used as forward proforma inputs (prior bug: keys 1-5
  # were mis-mapped onto D..H, applying 2024A/2025B rates to proforma
  # Years 1-2 and causing a spurious Year-2 NOI dip).
  loss_to_lease_by_year:
    1: { value: 0.0137, source: valuation_proforma_with_improvements_11_16_25, locator: { sheet: "ASSUMPTIONS", cell: "F34" }, note: "Proforma Year 1" }
    2: { value: 0.0100, source: valuation_proforma_with_improvements_11_16_25, locator: { sheet: "ASSUMPTIONS", cell: "G34" }, note: "Proforma Year 2" }
    3: { value: 0.0050, source: valuation_proforma_with_improvements_11_16_25, locator: { sheet: "ASSUMPTIONS", cell: "H34" }, note: "Proforma Year 3" }
  loss_to_lease_terminal:
    value: 0.0000
    source: valuation_proforma_with_improvements_11_16_25
    locator: { sheet: "ASSUMPTIONS", cell: "I34", col_label: "Proforma Year 4+" }
    note: "L2L burns down to zero as Year-1 rents lift in-place to market"

  concessions_by_year:
